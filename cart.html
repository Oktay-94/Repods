              <button class="bg-red-500 hover:bg-red-600 text-white font-medium py-2 px-4 rounded-lg">

                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>

              <div>
                <h3 class="text-gray-800 font-medium">Apple MacBook Pro 14"</h3>

              </div>
            </td>
            <td class="py-4 px-4 text-gray-800 font-medium">2.249,00 €</td>
            <td class="py-4 px-4">
              <div class="flex items-center">
                <button class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-1 px-3 rounded-l-lg">-</button>
                <input type="text" value="1" class="bg-gray-200 text-gray-800 py-1 px-2 w-12 text-center" />

                </svg>
              </button>

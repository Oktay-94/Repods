<!DOCTYPE html>

            </div>
          </div>
          <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <img src="https://image.pollinations.ai/prompt/refurbished%20white%20apple%20airpods%20in%20a%20white%20charging%20case?width=800&height=600&nologo=true" alt="AirPods" class="w-full h-48 object-cover">

              <h3 class="text-xl font-bold text-gray-800 mb-2">AirPods</h3>
